services:
  mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "scribe-rs", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "quit(db.hello().isWritablePrimary ? 0 : 1)"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    volumes:
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
